name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E tests (real provider — requires VISION_API_KEY secret)
        if: env.VISION_API_KEY != ''
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
        run: pnpm test:e2e

      - name: Golden eval (real provider — requires VISION_API_KEY secret)
        if: env.VISION_API_KEY != ''
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
        run: pnpm test:golden

      - name: Golden eval skipped (no VISION_API_KEY)
        if: env.VISION_API_KEY == ''
        run: echo "Skipping golden eval — set VISION_API_KEY repo secret for live vision gate on main"
