name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E tests (real provider, opt-in)
        if: env.VISION_API_KEY != ''
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
        run: pnpm test:e2e

      - name: E2E tests skipped (no VISION_API_KEY)
        if: env.VISION_API_KEY == ''
        run: echo "Skipping live E2E tests. This is intentional unless a maintainer opts into provider-spend CI with VISION_API_KEY."

  golden-eval:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Golden eval (real provider, opt-in)
        if: env.VISION_API_KEY != ''
        timeout-minutes: 10
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
        run: pnpm test:golden

      - name: Golden eval skipped (no VISION_API_KEY)
        if: env.VISION_API_KEY == ''
        run: echo "Skipping live golden eval. This is intentional unless a maintainer opts into provider-spend CI with VISION_API_KEY."
