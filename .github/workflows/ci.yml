name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # E2E with real provider (OpenAI or Gemini free tier)
      # Add GEMINI_API_KEY as a GitHub secret for free-tier CI
      - name: E2E tests (real provider)
        if: ${{ secrets.VISION_API_KEY != '' || secrets.GEMINI_API_KEY != '' }}
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY || secrets.GEMINI_API_KEY }}
          VISION_PROVIDER: ${{ secrets.VISION_API_KEY != '' && 'openai-compatible' || 'gemini' }}
          VISION_BASE_URL: ${{ secrets.VISION_API_KEY != '' && 'https://api.openai.com/v1' || 'https://generativelanguage.googleapis.com/v1beta' }}
          VISION_MODEL: ${{ secrets.VISION_API_KEY != '' && 'gpt-4o-mini' || 'gemini-2.0-flash' }}
        run: pnpm test:e2e

      - name: Golden eval (real provider)
        if: ${{ secrets.VISION_API_KEY != '' || secrets.GEMINI_API_KEY != '' }}
        env:
          VISION_API_KEY: ${{ secrets.VISION_API_KEY || secrets.GEMINI_API_KEY }}
          VISION_PROVIDER: ${{ secrets.VISION_API_KEY != '' && 'openai-compatible' || 'gemini' }}
          VISION_BASE_URL: ${{ secrets.VISION_API_KEY != '' && 'https://api.openai.com/v1' || 'https://generativelanguage.googleapis.com/v1beta' }}
          VISION_MODEL: ${{ secrets.VISION_API_KEY != '' && 'gpt-4o-mini' || 'gemini-2.0-flash' }}
        run: pnpm test:golden
